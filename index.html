<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VildanG</title>
</head>
<body>
    <div class="top">
        <img src="avatar.png" class="avatar" alt="Avatar">
        <h1 class="bioname">VildanG's <br>Bio</h1>
    </div>

    <div class="container">
        <div class="box">
            <div class="info-row">
                <h2 class="text1">Name:</h2>
                <h3 class="text2">Vildan</h3>
            </div>
            
            <div class="info-row">
                <h2 class="text1">Age:</h2>
                <h3 class="text2">16</h3>
            </div>

            <p class="bio-text">
                Just a guy
            </p>
        </div> 

        <div class="box">
            <div class="info-row">
                <h2 class="text1">Status:</h2>
                <h3 class="text2">Exams</h3>
            </div>
            <div class="info-row">
                <h2 class="text1">From:</h2>
                <h3 class="text2">Russia</h3>
            </div>
            <div class="info-row">
                <h2 class="text1">Telegram:</h2>
                <h3 class="text2"><a href="t.me/@vildang">@vildang</a></h3>
            </div>
            <div class="info-row">
                <h2 class="text1">Github:</h2>
                <h3 class="text2"><a href="https://github.com/vildangil">vildangil</a></h3>
            </div>
        </div> 
    </div>
</body>

<style>
    body {
        background-color: #24273a;
        margin: 0;
        padding: 15px;
        font-family: 'pixel', sans-serif;
    }

    @font-face {
        font-family: pixel;
        src: url(vcrfont.ttf);
    }

    h1, h2, h3, p {
        font-family: pixel;
        color: #cad3f5;
        margin: 0;
    }

    a{
       color: #b7bdf8; 
    }

    .top {
        background-color: #1e2030;
        position: fixed; 
        top: 15px;
        left: 15px;
        right: 15px;
        height: 100px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 25px;
        z-index: 1000;
    }

    .avatar {
        width: 75px;
        height: 75px;
        border: solid;
        border-radius: 50px;
        border-color: #babbf1;
        border-width: 3px;
        margin-right: 20px;
        padding: 3px;
    }

    .bioname {
        font-size: 22px;
        line-height: 1.1;
    }

    .container {
        margin-top: 130px; 
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .box {
        background-color: #1e2030;
        border-radius: 20px;
        padding: 25px;
        min-height: 200px;
        box-sizing: border-box;
        flex: 1 1 100%; 
        display: flex;
        flex-direction: column; 
        gap: 15px;
    }

    .info-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
    }

    .bio-text {
        font-size: 1rem;
        line-height: 1.4;
        color: #babbf1;
        margin-top: 10px;
    }

    @media (min-width: 600px) {
        .box {
            flex: 1 1 calc(50% - 10px);
        }
    }

    .text1 {
        font-weight: 100;
        font-size: 1.2rem;
    }

    .text2 {
        font-weight: 900;
        font-size: 1.4rem;
        color: #babbf1;
    }
</style>
</html>
